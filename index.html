<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Caminhada dos Caburés</title>

<style>
body {
    margin: 0;
    font-family: 'Trebuchet MS', sans-serif;
    background: url('https://images.unsplash.com/photo-1520975922284-7c5f8d7c8c2c?auto=format&fit=crop&w=1400&q=80');
    background-size: cover;
    color: white;
}

header {
    text-align: center;
    padding: 20px;
    background: rgba(0,0,0,0.6);
    font-size: 28px;
    font-weight: bold;
    letter-spacing: 2px;
}

.board {
    display: grid;
    grid-template-columns: repeat(6, 80px);
    grid-template-rows: repeat(6, 80px);
    gap: 5px;
    justify-content: center;
    margin-top: 30px;
}

.cell {
    width: 80px;
    height: 80px;
    background: rgba(255,255,255,0.15);
    border: 1px solid rgba(255,255,255,0.3);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    text-align: center;
    border-radius: 8px;
}

.player {
    font-size: 10px;
    padding: 3px;
    border-radius: 5px;
    background: rgba(0,0,0,0.6);
}

.controls {
    text-align: center;
    margin-top: 25px;
}

button {
    padding: 10px 20px;
    font-size: 16px;
    border: none;
    cursor: pointer;
    border-radius: 8px;
    background: gold;
    color: black;
    font-weight: bold;
}

#log {
    margin-top: 15px;
    text-align: center;
    font-size: 18px;
    background: rgba(0,0,0,0.5);
    padding: 10px;
}
</style>
</head>

<body>

<header>
🦉 Caminhada dos Caburés 🦉
</header>

<div class="board" id="board"></div>

<div class="controls">
    <button onclick="rollDice()">🎲 Jogar Dado</button>
</div>

<div id="log">Clique para começar a jornada!</div>

<script>
const players = [
    { name: "Vandson Primata Jr", pos: 0, color: "lightblue" },
    { name: "Jair Femboy", pos: 0, color: "pink" },
    { name: "Rian Caburé", pos: 0, color: "lightgreen" }
];

const board = document.getElementById("board");
const log = document.getElementById("log");

// criar tabuleiro
for (let i = 0; i < 36; i++) {
    let cell = document.createElement("div");
    cell.classList.add("cell");
    cell.id = "cell-" + i;
    board.appendChild(cell);
}

function render() {
    document.querySelectorAll(".cell").forEach(c => c.innerHTML = "");

    players.forEach(p => {
        let cell = document.getElementById("cell-" + p.pos);
        if (cell) {
            let div = document.createElement("div");
            div.classList.add("player");
            div.style.background = p.color;
            div.innerText = p.name;
            cell.appendChild(div);
        }
    });
}

function rollDice() {
    let current = players[Math.floor(Math.random() * players.length)];
    let roll = Math.floor(Math.random() * 6) + 1;

    current.pos += roll;
    if (current.pos >= 35) current.pos = 35;

    log.innerText = `${current.name} andou ${roll} casas!`;

    render();
}

render();
</script>

</body>
</html>
