<!DOCTYPE html><html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para Aylla ❤️</title><style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:linear-gradient(180deg,#ff9ec4,#ff6fa8,#ff4d88);
    font-family:Georgia,serif;
    overflow:hidden;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
}

.container{
    text-align:center;
    max-width:800px;
    padding:30px;
}

button{
    padding:18px 40px;
    border:none;
    border-radius:50px;
    background:white;
    color:#ff4d88;
    font-size:22px;
    font-weight:bold;
    cursor:pointer;
    box-shadow:0 0 20px rgba(255,255,255,.5);
}

button:hover{
    transform:scale(1.05);
}

#carta{
    display:none;
    background:rgba(255,255,255,.15);
    backdrop-filter:blur(10px);
    padding:30px;
    border-radius:20px;
    margin-top:20px;
    line-height:1.8;
    font-size:20px;
    box-shadow:0 0 25px rgba(0,0,0,.2);
}

.coracao{
    position:fixed;
    font-size:30px;
    animation:subir 6s linear infinite;
    pointer-events:none;
}

@keyframes subir{
    from{
        transform:translateY(100vh);
        opacity:1;
    }
    to{
        transform:translateY(-100px);
        opacity:0;
    }
}
</style></head>
<body><div class="container"><h1>❤️ Para Aylla ❤️</h1>
<br>

<button onclick="abrir()">
    Clique aqui 💌
</button>

<div id="carta"></div>

</div><div id="player"></div><script src="https://www.youtube.com/iframe_api"></script><script>

var player;

function onYouTubeIframeAPIReady(){

    player = new YT.Player('player',{
        height:'0',
        width:'0',
        videoId:'kPa7bsKwL-c'
    });

}

const texto = `
Feliz 3 meses de namoro minha linda, primeiramente eu quero te agradecer por tudo minha bebêzona.

Obrigado por ser tão especial pra mim e fazer todos os meus dias felizes.

Eu sempre lembro de cada momento com você, aí na frente da sua casa, na rua, assistindo, conversando, rindo. Qualquer momento com você se torna especial e sempre vai estar guardado no meu coração.

Mesmo com desentendimentos ou coisas bestas que acontecem 🙄 eu prometo sempre amar você independente de tudo.

Você faz meus dias felizes, me salva todos os dias, me faz querer ser uma pessoa melhor.

Quando eu olho pro seu sorriso, seu jeitinho, seus olhos, sua risada, tudo, tudo, tudo mesmo me deixa cada vez mais apaixonado por você, meu amor.

EU TE AMOOOOOO 🩷🌹
`;

function abrir(){

    document.querySelector("button").style.display="none";

    const carta = document.getElementById("carta");
    carta.style.display="block";

    if(player){
        player.playVideo();
    }

    let i = 0;

    function escrever(){

        if(i < texto.length){
            carta.innerHTML += texto.charAt(i);
            i++;
            setTimeout(escrever,40);
        }

    }

    escrever();

    setInterval(criarCoracao,300);
}

function criarCoracao(){

    const c = document.createElement("div");

    c.className = "coracao";
    c.innerHTML = "❤️";

    c.style.left = Math.random()*100 + "vw";

    document.body.appendChild(c);

    setTimeout(()=>{
        c.remove();
    },6000);
}

</script></body>
</html>
