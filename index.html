<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Caminhada dos Caburés</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: url('https://images.unsplash.com/photo-1501785888041-af3ef285b470?auto=format&fit=crop&w=1600&q=80');
    background-size: cover;
    color: white;
}

header {
    text-align: center;
    padding: 20px;
    background: rgba(0,0,0,0.7);
    font-size: 28px;
}

.board {
    display: grid;
    grid-template-columns: repeat(6, 90px);
    grid-template-rows: repeat(6, 90px);
    gap: 4px;
    justify-content: center;
    margin-top: 25px;
}

.cell {
    width: 90px;
    height: 90px;
    border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.3);
    background-size: cover;
    background-position: center;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
}

/* tipos de terreno */
.grass { background-image: url('https://images.unsplash.com/photo-1501004318641-b39e6451bec6?auto=format&fit=crop&w=300&q=80'); }
.forest { background-image: url('https://images.unsplash.com/photo-1501785888041-af3ef285b470?auto=format&fit=crop&w=300&q=80'); }
.stone { background-image: url('https://images.unsplash.com/photo-1523413651479-597eb2da0ad6?auto=format&fit=crop&w=300&q=80'); }

.player {
    font-size: 10px;
    padding: 4px;
    border-radius: 6px;
    background: rgba(0,0,0,0.7);
}

.controls {
    text-align: center;
    margin-top: 20px;
}

button {
    padding: 10px 20px;
    font-size: 16px;
    border: none;
    border-radius: 8px;
    background: gold;
    cursor: pointer;
    font-weight: bold;
}

#log {
    margin-top: 15px;
    text-align: center;
    background: rgba(0,0,0,0.6);
    padding: 10px;
}
</style>
</head>

<body>

<header>
🦉 Caminhada dos Caburés 🦉
</header>

<div class="board" id="board"></div>

<div class="controls">
    <button onclick="rollDice()">🎲 Jogar Dado</button>
</div>

<div id="log">Iniciando aventura...</div>

<script>
const players = [
    { name: "Vandson Primata Jr", pos: 0, color: "lightblue" },
    { name: "Jair Femboy", pos: 0, color: "pink" },
    { name: "Rian Caburé", pos: 0, color: "lightgreen" }
];

const board = document.getElementById("board");
const log = document.getElementById("log");

// criar tabuleiro com tipos diferentes
for (let i = 0; i < 36; i++) {
    let cell = document.createElement("div");
    cell.classList.add("cell");

    if (i % 3 === 0) cell.classList.add("forest");
    else if (i % 3 === 1) cell.classList.add("grass");
    else cell.classList.add("stone");

    cell.id = "cell-" + i;
    board.appendChild(cell);
}

function render() {
    document.querySelectorAll(".cell").forEach(c => c.innerHTML = "");

    players.forEach(p => {
        let cell = document.getElementById("cell-" + p.pos);

        if (cell) {
            let div = document.createElement("div");
            div.classList.add("player");
            div.style.color = p.color;
            div.innerText = "🦉 " + p.name;
            cell.appendChild(div);
        }
    });
}

function rollDice() {
    let p = players[Math.floor(Math.random() * players.length)];
    let roll = Math.floor(Math.random() * 6) + 1;

    p.pos += roll;
    if (p.pos > 35) p.pos = 35;

    log.innerText = `${p.name} andou ${roll} casas!`;
    render();
}

render();
</script>

</body>
</html>
